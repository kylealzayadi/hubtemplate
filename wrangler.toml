name = "the-hub"
compatibility_date = "2026-04-05"
compatibility_flags = ["nodejs_compat"]
main = "worker.js"

# Run `npm run db:create` and paste the printed database_id below.
[[d1_databases]]
binding = "DB"
database_name = "hub-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[assets]
directory = "./dist"
